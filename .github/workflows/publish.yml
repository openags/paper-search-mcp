name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12', '3.13']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Compile source
        run: python -m compileall -q paper_search_mcp tests

      - name: Run deterministic tests
        run: python -m pytest tests/test_package_entrypoints.py tests/test_config_env.py tests/test_unpaywall.py tests/test_unpaywall_source.py -q --tb=short

      - name: Build package
        run: uv build

      - name: Verify wheel entry points
        run: |
          python -c "import pathlib, zipfile; wheel = next(pathlib.Path('dist').glob('paper_search_mcp-*.whl')); z = zipfile.ZipFile(wheel); entry = next(name for name in z.namelist() if name.endswith('.dist-info/entry_points.txt')); data = z.read(entry).decode(); assert 'paper-search-mcp = paper_search_mcp.server:main' in data; assert 'paper-search = paper_search_mcp.cli:main' in data; print(data)"

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Verify wheel entry points
        run: |
          python -c "import pathlib, zipfile; wheel = next(pathlib.Path('dist').glob('paper_search_mcp-*.whl')); z = zipfile.ZipFile(wheel); entry = next(name for name in z.namelist() if name.endswith('.dist-info/entry_points.txt')); data = z.read(entry).decode(); assert 'paper-search-mcp = paper_search_mcp.server:main' in data; assert 'paper-search = paper_search_mcp.cli:main' in data; print(data)"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
